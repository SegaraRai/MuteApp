name: Build and Release
on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends binutils-mingw-w64-x86-64 gcc-mingw-w64-x86-64 zip

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-gnu

      - run: cargo build --release --locked --target x86_64-pc-windows-gnu

      - run: cargo test --locked --target x86_64-pc-windows-gnu --no-run

      - name: Package
        run: |
          mkdir -p dist
          zip -j dist/MuteApp.zip ./target/x86_64-pc-windows-gnu/release/MuteApp.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MuteApp
          path: dist/MuteApp.zip

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
